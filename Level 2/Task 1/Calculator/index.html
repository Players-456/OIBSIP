<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Premium Calculator — Dharmit Monani · Oasis Infobyte" />
  <title>Calculator</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔢</text></svg>" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="app">

    <!-- Header -->
    <div class="app-header">
      <span class="app-title">// calculator</span>
      <div style="display:flex; gap:0.5rem;">
        <button id="themeToggle" class="mode-toggle" title="Toggle Theme" style="padding:0.3rem; width:28px; justify-content:center;">
          <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;display:none;"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
          <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
        <button class="mode-toggle" id="modeToggle" title="Toggle scientific mode">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2v-4M9 21H5a2 2 0 0 1-2-2v-4m0 0h18"/>
          </svg>
          SCI
        </button>
      </div>
    </div>

    <!-- Calculator Card -->
    <div class="calc-card">

      <!-- Scientific Row (hidden by default) -->
      <div class="keypad-sci" id="sciPad">
        <button class="btn btn-sci" data-sci="sin">sin</button>
        <button class="btn btn-sci" data-sci="cos">cos</button>
        <button class="btn btn-sci" data-sci="tan">tan</button>
        <button class="btn btn-sci" data-sci="sqrt">√</button>
        <button class="btn btn-sci" data-sci="log">log</button>
        <button class="btn btn-sci" data-sci="ln">ln</button>
        <button class="btn btn-sci" data-sci="pow">xʸ</button>
        <button class="btn btn-sci" data-sci="pi">π</button>
      </div>

      <!-- Display -->
      <div class="display">
        <div class="display__expression" id="expression"></div>
        <div class="display__main">
          <div class="display__value" id="displayValue">0</div>
          <button class="btn-copy" id="btnCopy" title="Copy result" aria-label="Copy result">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Main Keypad -->
      <div class="keypad">
        <!-- Row 1 -->
        <button class="btn btn-util" data-action="clear">AC</button>
        <button class="btn btn-del"  data-action="delete">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/>
          </svg>
        </button>
        <button class="btn btn-pct"  data-action="percent">%</button>
        <button class="btn btn-op"   data-op="/">÷</button>

        <!-- Row 2 -->
        <button class="btn btn-num" data-num="7">7</button>
        <button class="btn btn-num" data-num="8">8</button>
        <button class="btn btn-num" data-num="9">9</button>
        <button class="btn btn-op"  data-op="*">×</button>

        <!-- Row 3 -->
        <button class="btn btn-num" data-num="4">4</button>
        <button class="btn btn-num" data-num="5">5</button>
        <button class="btn btn-num" data-num="6">6</button>
        <button class="btn btn-op"  data-op="-">−</button>

        <!-- Row 4 -->
        <button class="btn btn-num" data-num="1">1</button>
        <button class="btn btn-num" data-num="2">2</button>
        <button class="btn btn-num" data-num="3">3</button>
        <button class="btn btn-op"  data-op="+">+</button>

        <!-- Row 5 -->
        <button class="btn btn-num btn-zero" data-num="0">0</button>
        <button class="btn btn-num" data-num=".">.</button>
        <button class="btn btn-eq"  data-action="equals">=</button>
      </div>

    </div>

    <!-- History Panel -->
    <div class="history-panel">
      <div class="history-header">
        <span class="history-title">// history</span>
        <button class="btn-clear-hist" id="btnClearHist">Clear</button>
      </div>
      <p class="history-empty" id="historyEmpty">No calculations yet.</p>
      <ul class="history-list" id="historyList"></ul>
    </div>

    <!-- Keyboard hint -->
    <p class="kb-hint">Keyboard supported &nbsp;·&nbsp; Enter = equals &nbsp;·&nbsp; Esc = clear</p>

  </div>

  <!-- Toast -->
  <div class="toast" id="toast">Copied!</div>

  <script src="js/main.js"></script>
</body>
</html>
