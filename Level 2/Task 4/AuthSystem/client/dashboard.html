<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | AuthSystem</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
      </div>
      <span>AuthSystem</span>
    </a>
    <div class="nav-actions">
      <button class="theme-toggle" aria-label="Toggle Theme">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
      </button>
    </div>
  </nav>

  <!-- Dashboard Layout -->
  <main class="dashboard-page">
    
    <div class="dashboard-header">
      <h1 class="dashboard-greeting">Hello, <span>Welcome</span></h1>
      <button class="btn-logout">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        Logout
      </button>
    </div>

    <!-- Stats Grid -->
    <div class="dashboard-grid">
      <div class="dash-card">
        <div class="dash-card-icon green">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        </div>
        <div class="dash-card-title">Auth Status</div>
        <div class="dash-card-value" id="card-auth-status">Authenticated</div>
      </div>
      
      <div class="dash-card">
        <div class="dash-card-icon violet">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </div>
        <div class="dash-card-title">User Role</div>
        <div class="dash-card-value" id="card-user-role">Loading...</div>
      </div>

      <div class="dash-card">
        <div class="dash-card-icon cyan">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
        </div>
        <div class="dash-card-title">Member Since</div>
        <div class="dash-card-value" id="card-member-since">Loading...</div>
      </div>

      <div class="dash-card">
        <div class="dash-card-icon orange">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
        </div>
        <div class="dash-card-title">JWT Session</div>
        <div class="dash-card-value" id="card-jwt-session">Active</div>
      </div>
    </div>

    <!-- Profile Card -->
    <div class="profile-card">
      <div class="profile-avatar">U</div>
      <div class="profile-info">
        <h3 class="profile-name">Loading...</h3>
        <p class="profile-email">Loading...</p>
        <div class="profile-role">
          <span class="badge-dot"></span> User
        </div>
      </div>
    </div>

  </main>

  <script src="js/main.js"></script>
</body>
</html>
