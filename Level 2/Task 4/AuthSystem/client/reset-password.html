<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — AuthSystem</title>
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav class="navbar" id="navbar">
  <a href="index.html" class="nav-logo">
    <div class="nav-logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    Auth<span>System</span>
  </a>
  <div class="nav-actions">
    <button class="theme-toggle" id="themeToggle" title="Toggle theme">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card" id="resetCard">

    <div class="auth-card-header">
      <div class="auth-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <h1 class="auth-title">Set New Password</h1>
      <p class="auth-subtitle">Must be at least 6 characters</p>
    </div>

    <!-- Alert box -->
    <div class="alert" id="alertBox" role="alert">
      <span class="alert-icon"></span>
      <span id="alertText"></span>
    </div>

    <!-- Invalid/expired token state (hidden by default) -->
    <div id="invalidTokenMsg" style="display:none; text-align:center; padding:1rem 0;">
      <p style="color:var(--red); margin-bottom:1rem;">This reset link is invalid or has expired.</p>
      <a href="forgot-password.html" class="btn-submit" style="display:inline-flex; align-items:center; gap:0.5rem; text-decoration:none;">
        Request a New Link
      </a>
    </div>

    <form class="auth-form" id="resetForm" novalidate>

      <div class="form-group">
        <label class="form-label" for="password">New Password</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </span>
          <input type="password" id="password" class="form-input" placeholder="Min 6 characters" autocomplete="new-password" required />
          <button type="button" class="btn-eye" id="eyeToggle1" aria-label="Toggle password">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <!-- Password strength -->
        <div class="strength-wrap">
          <div class="strength-bars">
            <div class="strength-bar" id="bar1"></div>
            <div class="strength-bar" id="bar2"></div>
            <div class="strength-bar" id="bar3"></div>
            <div class="strength-bar" id="bar4"></div>
          </div>
          <span class="strength-label" id="strengthLabel">Enter a password</span>
        </div>
        <span class="field-error" id="pwError">Password must be at least 6 characters.</span>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm New Password</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </span>
          <input type="password" id="confirmPassword" class="form-input" placeholder="Repeat password" autocomplete="new-password" required />
          <button type="button" class="btn-eye" id="eyeToggle2" aria-label="Toggle confirm password">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <span class="field-error" id="confirmError">Passwords do not match.</span>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
        Reset Password
      </button>

    </form>

  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>
<script src="js/main.js"></script>
<script>
  /* ── RESET PASSWORD PAGE LOGIC ──────────────── */
  const form          = document.getElementById('resetForm');
  const submitBtn     = document.getElementById('submitBtn');
  const passwordEl    = document.getElementById('password');
  const confirmEl     = document.getElementById('confirmPassword');
  const pwError       = document.getElementById('pwError');
  const confirmError  = document.getElementById('confirmError');
  const alertBox      = document.getElementById('alertBox');
  const alertText     = document.getElementById('alertText');
  const invalidMsg    = document.getElementById('invalidTokenMsg');
  const strengthLabel = document.getElementById('strengthLabel');
  const bars          = [document.getElementById('bar1'), document.getElementById('bar2'), document.getElementById('bar3'), document.getElementById('bar4')];

  /* ── Extract token from URL ?token=xxxx ─────── */
  const params = new URLSearchParams(window.location.search);
  const token  = params.get('token');

  // If no token in URL — show invalid state immediately
  if (!token) {
    form.style.display = 'none';
    invalidMsg.style.display = 'block';
  }

  function showAlert(message, type = 'error') {
    alertBox.className = `alert ${type} show`;
    alertBox.querySelector('.alert-icon').textContent = type === 'success' ? '✅' : '❌';
    alertText.textContent = message;
  }

  function setLoading(loading) {
    submitBtn.disabled = loading;
    submitBtn.innerHTML = loading
      ? '<div class="spinner"></div> Resetting...'
      : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg> Reset Password';
  }

  /* ── Password strength ───────────────────────── */
  function getStrength(pw) {
    let score = 0;
    if (pw.length >= 6)  score++;
    if (pw.length >= 10) score++;
    if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
    if (/[0-9]/.test(pw) || /[^A-Za-z0-9]/.test(pw)) score++;
    return score;
  }

  const levelMap = { 1: ['weak','Weak'], 2: ['fair','Fair'], 3: ['good','Good'], 4: ['strong','Strong'] };

  passwordEl.addEventListener('input', () => {
    const pw     = passwordEl.value;
    const score  = getStrength(pw);
    const [cls, label] = levelMap[score] || ['', 'Enter a password'];
    bars.forEach((b, i) => {
      b.className = 'strength-bar' + (i < score ? ` active ${cls}` : '');
    });
    strengthLabel.textContent = pw.length === 0 ? 'Enter a password' : label;
    pwError.classList.remove('show');
    passwordEl.classList.remove('error-field');
  });

  confirmEl.addEventListener('input', () => {
    confirmError.classList.remove('show');
    confirmEl.classList.remove('error-field');
  });

  /* ── Eye toggles ─────────────────────────────── */
  document.getElementById('eyeToggle1').addEventListener('click', () => {
    passwordEl.type = passwordEl.type === 'password' ? 'text' : 'password';
  });
  document.getElementById('eyeToggle2').addEventListener('click', () => {
    confirmEl.type = confirmEl.type === 'password' ? 'text' : 'password';
  });

  /* ── Submit ──────────────────────────────────── */
  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const password = passwordEl.value;
    const confirm  = confirmEl.value;
    let valid = true;

    if (password.length < 6) {
      pwError.classList.add('show');
      passwordEl.classList.add('error-field');
      valid = false;
    }
    if (password !== confirm) {
      confirmError.classList.add('show');
      confirmEl.classList.add('error-field');
      valid = false;
    }
    if (!valid) return;

    alertBox.classList.remove('show');
    setLoading(true);

    try {
      // POST to /api/auth/reset-password/:token
      const res = await fetch(`/api/auth/reset-password/${token}`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ password }),
      });
      const data = await res.json();

      if (data.success) {
        // Save the new token and redirect to dashboard
        localStorage.setItem('authToken', data.token);
        localStorage.setItem('authUser',  JSON.stringify(data.user));
        showAlert('Password reset! Redirecting to dashboard...', 'success');
        showToast('Password updated successfully!', 'success');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1800);
      } else {
        showAlert(data.message, 'error');
        // If invalid/expired token — show the request-new-link UI
        if (res.status === 400) {
          setTimeout(() => {
            form.style.display = 'none';
            invalidMsg.style.display = 'block';
          }, 2000);
        }
      }
    } catch (err) {
      showAlert('Network error. Please check your connection.', 'error');
    } finally {
      setLoading(false);
    }
  });
</script>
</body>
</html>
