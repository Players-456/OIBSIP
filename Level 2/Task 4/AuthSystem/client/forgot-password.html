<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — AuthSystem</title>
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- Navbar -->
<nav class="navbar" id="navbar">
  <a href="index.html" class="nav-logo">
    <div class="nav-logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    Auth<span>System</span>
  </a>
  <div class="nav-actions">
    <button class="theme-toggle" id="themeToggle" title="Toggle theme">
      <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-card-header">
      <div class="auth-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      </div>
      <h1 class="auth-title">Forgot Password?</h1>
      <p class="auth-subtitle">Enter your email and we'll send a reset link</p>
    </div>

    <!-- Alert box -->
    <div class="alert" id="alertBox" role="alert">
      <span class="alert-icon"></span>
      <span id="alertText"></span>
    </div>

    <form class="auth-form" id="forgotForm" novalidate>

      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </span>
          <input
            type="email"
            id="email"
            class="form-input"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
        </div>
        <span class="field-error" id="emailError">Please enter a valid email.</span>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Send Reset Link
      </button>

    </form>

    <div class="auth-footer" style="margin-top:1.25rem">
      Remember your password? <a href="login.html">Sign in</a>
    </div>

  </div>
</div>

<!-- Toast -->
<div class="toast-wrap" id="toastWrap"></div>

<script src="js/main.js"></script>
<script>
  /* ── FORGOT PASSWORD PAGE LOGIC ─────────────── */
  const form      = document.getElementById('forgotForm');
  const submitBtn = document.getElementById('submitBtn');
  const emailEl   = document.getElementById('email');
  const emailErr  = document.getElementById('emailError');
  const alertBox  = document.getElementById('alertBox');
  const alertText = document.getElementById('alertText');

  function showAlert(message, type = 'error') {
    alertBox.className = `alert ${type} show`;
    alertBox.querySelector('.alert-icon').textContent = type === 'success' ? '✅' : type === 'info' ? 'ℹ️' : '❌';
    alertText.textContent = message;
  }

  function setLoading(loading) {
    submitBtn.disabled = loading;
    submitBtn.innerHTML = loading
      ? '<div class="spinner"></div> Sending...'
      : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Send Reset Link';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = emailEl.value.trim();

    // Client-side validation
    if (!email || !/^\S+@\S+\.\S+$/.test(email)) {
      emailErr.classList.add('show');
      emailEl.classList.add('error-field');
      return;
    }
    emailErr.classList.remove('show');
    emailEl.classList.remove('error-field');
    alertBox.classList.remove('show');

    setLoading(true);

    try {
      const res = await fetch('/api/auth/forgot-password', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email }),
      });
      const data = await res.json();

      if (data.success) {
        showAlert(data.message, 'success');
        form.reset();
        showToast('Reset email sent!', 'success');
      } else {
        showAlert(data.message, 'error');
      }
    } catch (err) {
      showAlert('Network error. Please check your connection.', 'error');
    } finally {
      setLoading(false);
    }
  });

  // Clear field error on input
  emailEl.addEventListener('input', () => {
    emailErr.classList.remove('show');
    emailEl.classList.remove('error-field');
  });
</script>
</body>
</html>
